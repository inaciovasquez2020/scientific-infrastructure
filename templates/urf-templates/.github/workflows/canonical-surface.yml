name: canonical-surface

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run canonical tests
        run: |
          pytest -q tests/test_canonical_surface.py

      - name: Reject tracked transient files only
        run: |
          git ls-files | grep -E '(^|/)__pycache__/' && exit 1 || true
          git ls-files | grep -E '\.pyc$' && exit 1 || true
          git ls-files | grep -E '\.aux$' && exit 1 || true
          git ls-files | grep -E '\.fdb_latexmk$' && exit 1 || true
          git ls-files | grep -E '\.fls$' && exit 1 || true
          git ls-files | grep -E '\.log$' && exit 1 || true
          git ls-files | grep -E '\.out$' && exit 1 || true
